name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            platform: ubuntu-22.04
            args: --bundles deb,appimage
            targets: ""
            assetPattern: Twitch-Adblock-Player-v[version]-Linux-x86_64[ext]
          - name: Windows x86_64
            platform: windows-latest
            args: --bundles nsis,msi
            targets: ""
            assetPattern: Twitch-Adblock-Player-v[version]-Windows-x86_64[ext]
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg
            targets: aarch64-apple-darwin
            assetPattern: Twitch-Adblock-Player-v[version]-macOS-Apple-Silicon[ext]
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg
            targets: x86_64-apple-darwin
            assetPattern: Twitch-Adblock-Player-v[version]-macOS-Intel[ext]

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Twitch Adblock Player ${{ github.ref_name }}
          releaseBody: |
            Choose the download for your operating system:
            - Windows: use `.exe`; `.msi` is available for managed installations.
            - macOS Apple Silicon: for M1, M2, M3, M4, and newer Macs.
            - macOS Intel: for Macs with an Intel processor.
            - Linux: use `.AppImage` on most distributions or `.deb` on Debian and Ubuntu.

            macOS builds are currently unsigned. After moving the app to Applications,
            macOS may report that it is damaged. For this release, remove quarantine with:
            `xattr -dr com.apple.quarantine "/Applications/Twitch Adblock.app"`
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: false
          releaseAssetNamePattern: ${{ matrix.assetPattern }}
          args: ${{ matrix.args }}
