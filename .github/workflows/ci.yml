name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test core
        run: cargo test -p twitch-adblock --all-targets

      - name: Check desktop
        run: cargo check -p twitch-adblock-desktop

      - name: Test desktop UI
        if: runner.os == 'macOS'
        run: node desktop/tests/ui-smoke.mjs

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
